site_name: Threader - Dialogue Kit
site_description: Threader — Visual Dialogue System for Unity
site_url: https://stefanvorster17.github.io/Threader-Docs/

extra:
  version: "1.0"

copyright: "Threader Dialogue Kit &nbsp;·&nbsp; v1.0 (Unreleased)"

markdown_extensions:
  - attr_list
  - md_in_html

extra_css:
  - assets/extra.css

theme:
  name: material
  logo: assets/images/logo.png
  favicon: assets/images/logo.png
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - toc.follow
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: quick-start.md
    - Tutorial: tutorial.md
  - Editor:
    - Graph Editor: graph-editor.md
    - Dialogue Preview: preview-window.md
  - Systems:
    - Node Reference: nodes.md
    - Variables: variables.md
    - Conditions: conditions.md
    - Events: events.md
    - Speaker Roster: speaker-roster.md
    - UI: ui.md
    - Entry Points: entry-points.md
    - Saving: saving.md
  - API: api-reference.md
  - Support:
    - Troubleshooting: troubleshooting.md
  - Release:
    - Roadmap: roadmap.md
    - Changelog: changelog.md