site_name: Threader
site_description: Threader — Visual Dialogue System for Unity

markdown_extensions:
  - attr_list
  - md_in_html

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: purple
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - Tutorial: tutorial.md
  - Graph Editor: graph-editor.md
  - Node Reference: nodes.md
  - Variables: variables.md
  - Conditions: conditions.md
  - Entry Points: entry-points.md
  - Saving: saving.md
  - API Reference: api-reference.md
  - Changelog: changelog.md