name: Route Issues to Discord

on:
  issues:
    types: [opened]

jobs:
  route:
    runs-on: ubuntu-latest
    steps:
      - name: Post to bug-reports
        if: contains(toJson(github.event.issue.labels.*.name), 'bug')
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"**New Bug Report:** [#${{ github.event.issue.number }} — ${{ github.event.issue.title }}](${{ github.event.issue.html_url }})\nSubmitted by **${{ github.event.issue.user.login }}**\"}" \
          ${{ secrets.DISCORD_BUGS_WEBHOOK }}

      - name: Post to feature-requests
        if: contains(toJson(github.event.issue.labels.*.name), 'enhancement')
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"**New Feature Request:** [#${{ github.event.issue.number }} — ${{ github.event.issue.title }}](${{ github.event.issue.html_url }})\nSubmitted by **${{ github.event.issue.user.login }}**\"}" \
          ${{ secrets.DISCORD_FEATURES_WEBHOOK }}
